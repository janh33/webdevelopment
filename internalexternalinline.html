

<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>

        h2 {
            color: blue;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 60%;
        }

        th {
            background-color: lightgray;
        }

    </style>

</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">
        Student Information
    </h1>

    <h2>Using Different Types of CSS</h2>

    <table border="1" cellpadding="10">

        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Year</th>
        </tr>

        <tr>
            <td>Janhavi</td>
            <td>Computer Engineering</td>
            <td>Second Year</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>Information Technology</td>
            <td>Third Year</td>
        </tr>

    </table>

</body>
</html>






<!--External-->

body {
    background-color: #f2f2f2;
    font-family: Arial;
}

table {
    margin: auto;
}

td {
    text-align: center;
}

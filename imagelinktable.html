<!DOCTYPE html>
<html>
<head>
    <title>Image, Hyperlink and Nested Table</title>
</head>
<body>

    <h2>Student Information Page</h2>

    <!-- Image -->
    <h3>Image</h3>
         src=""
         alt="Sample Image"
         width="200"
         height="150">

    <br><br>

    <!-- Hyperlink -->
    <h3>Hyperlink</h3>
    <a href="https://www.google.com" target="_blank">
        Visit Google
    </a>

    <br><br>

    <!-- Main Table -->
    <h3>Nested Table Example</h3>

<table border="1">
<tr>
<th>Name</th>
<th>Details</th>
</tr>

<tr>
<td>John</td>
<td>
<table border="1">
<tr>
<th>Course</th>
<th>Year</th>
</tr>
<tr>
<td>Computer Engineering</td>
<td>Second Year</td>
</tr>
</table>
</td>
</tr>
</table>

</body>
</html>

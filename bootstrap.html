<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Responsive Web Page</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                My Bootstrap Page
            </a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-4">

        <div class="row">

            <!-- Column 1 -->
            <div class="col-md-4">

                <div class="card">

                    <div class="card-body">

                        <h3 class="card-title">About</h3>

                        <p class="card-text">
                            This is a responsive Bootstrap card.
                        </p>

                        <button class="btn btn-primary">
                            Read More
                        </button>

                    </div>

                </div>

            </div>

            <!-- Column 2 -->
            <div class="col-md-4">

                <div class="card">

                    <div class="card-body">

                        <h3 class="card-title">Services</h3>

                        <p class="card-text">
                            Bootstrap makes web design easy.
                        </p>

                        <button class="btn btn-success">
                            Explore
                        </button>

                    </div>

                </div>

            </div>

            <!-- Column 3 -->
            <div class="col-md-4">

                <div class="card">

                    <div class="card-body">

                        <h3 class="card-title">Contact</h3>

                        <p class="card-text">
                            Responsive design works on all devices.
                        </p>

                        <button class="btn btn-danger">
                            Contact Us
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
